# Scoped pytest config (v1.1.5): keeps rootdir = tests/ so modern pytest (>=8)
# does not treat the integration package root (which must have __init__.py) as a
# collectable Package and import it — that import requires a full HA runtime.
# Run the suite with:  cd tests && pytest . -v
[pytest]
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
